---
fullnameOverride: platform-relay
namespace: platform
databaseInit:
  enabled: false
  postgres:
    host: platform-postgres
    port: 5432
    username: postgres
    password: ''
    database: postgres
  rolePasswords:
    casdoor: ''
    edreamcrowd: ''
    newapi: ''
    broker: ''
  secret:
    create: false
    name: platform-postgres-init-secret
postgres:
  enabled: false
  fullnameOverride: platform-postgres
  instanceOverride: platform-db
  image:
    repository: 81.71.122.120/base-images/postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  auth:
    database: postgres
    username: postgres
    password: ''
  persistence:
    enabled: true
    storageClassName: local-path
    size: 8Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 1536Mi
  secret:
    create: false
    name: platform-postgres-secret
new-api:
  enabled: true
  fullnameOverride: relay-new-api
  instanceOverride: relay-new-api
  image:
    repository: 81.71.122.120/platform/relay-new-api
    tag: main-20260717213114
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
    nodePort: null
  env:
    TZ: Asia/Shanghai
    NODE_NAME: relay-new-api-staging-1
    TLS_INSECURE_SKIP_VERIFY: "true"
  secret:
    create: false
    SQL_DSN: ''
    REDIS_CONN_STRING: ''
    SESSION_SECRET: ''
    CRYPTO_SECRET: ''
    name: relay-new-api-secret
ai-provider-adapter:
  enabled: true
  fullnameOverride: ai-provider-adapter
  instanceOverride: ai-provider-adapter
  image:
    repository: 81.71.122.120/platform/ai-provider-adapter
    tag: main-20260717213114
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    nodePort: null
  env:
    AI_PROVIDER_ADAPTER_DEFAULT_PROVIDER: moma_seedance
    AI_PROVIDER_ADAPTER_MODEL_PROVIDER_MAP: '{"doubao-seedance-2.0":"moma_seedance","AICC-doubao-seedance-2.0":"moma_seedance","doubao-seedance-2-0-260128":"moma_seedance","veo_3_1_fast":"keyiyun_veo","veo_3_1_fast_stable":"keyiyun_veo","veo3_fast":"keyiyun_veo","grok_video3":"keyiyun_grok","grok_video3_pro":"keyiyun_grok","grok-4-fast":"keyiyun_grok"}'
    MOMA_SEEDANCE_BASE_URL: https://zhenze-huhehaote.cmecloud.cn
    MOMA_SEEDANCE_MODEL: doubao-seedance-2.0
    MOMA_SEEDANCE_ENABLE_VIDEO_ENCRYPT: 'false'
    KEYIYUN_BASE_URL: https://zcbservice.aizfw.cn/kyyReactApiServer
    KEYIYUN_VEO_CREATE_PATH: "/v1/veo/videos"
    KEYIYUN_GROK_CREATE_PATH: "/v1/grok/videos"
    LOG_LEVEL: ERROR
    TOP_LOGGER_LEVEL: ERROR
    TASK_LOGGER_LEVEL: ERROR
  secret:
    create: false
    MOMA_SEEDANCE_API_KEY: ''
    KEYIYUN_API_KEY: ''
    name: ai-provider-adapter-secret
newapi-compat-gateway:
  enabled: true
  fullnameOverride: newapi-compat-gateway
  instanceOverride: newapi-compat-gateway
  image:
    repository: 81.71.122.120/platform/newapi-compat-gateway
    tag: main-20260717213114
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    nodePort: null
  env:
    NEWAPI_UPSTREAM_BASE_URL: http://relay-new-api:3000
    NEWAPI_COMPAT_REQUEST_TIMEOUT_SECONDS: '120'
broker:
  enabled: true
  fullnameOverride: relay-broker
  instanceOverride: relay-broker
  image:
    repository: 81.71.122.120/platform/relay-broker
    tag: main-20260717233309
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    nodePort: null
  env:
    AUTH_MODE: jwt
    BROKER_ENVIRONMENT: staging
    BROKER_PUBLIC_BASE_URL: https://api.ymmjc.com/broker
    CASDOOR_ISSUER: https://auth.ymmjc.com
    CASDOOR_AUDIENCE: ec5db9ad91bb6b87656b
    CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
    NEWAPI_BASE_URL: http://relay-new-api:3000
    NEWAPI_PUBLIC_BASE_URL: https://api.ymmjc.com
    OFFICIAL_PROVIDER_PUBLIC_BASE_URL: https://edream-api.ymmjc.com
    NEWAPI_ADMIN_USER_ID: '1'
    NEWAPI_MANAGED_TOKEN_GROUP: default
    NEWAPI_MANAGED_TOKEN_QUOTA_MULTIPLIER: '5000'
    BROKER_MODEL_CATALOG_JSON: '{"text":[{"id":"qwen/qwen3.7-max","name":"Qwen3.7
      Max","capabilities":["text"]},{"id":"MiniMax-M2.5","name":"MiniMax M2.5","capabilities":["text"],"agent_default":true},{"id":"deepseek-v3.2","name":"DeepSeek
      V3.2","capabilities":["text"]},{"id":"deepseek-r1-0528","name":"DeepSeek R1
      0528","capabilities":["text"]},{"id":"ZHIPU/GLM-5.2","name":"GLM 5.2","capabilities":["text"]}],"image":[{"id":"qwen/qwen-image-2.0-pro","name":"Qwen
      Image 2.0 Pro","capabilities":["image"],"endpoint":"openai-images"}],"video":[{"id":"AICC-doubao-seedance-2.0","name":"Doubao
      Seedance 2.0","capabilities":["video"]},{"id":"doubao-seedance-2.0","name":"Doubao
      Seedance 2.0 Raw","capabilities":["video"]},{"id":"doubao-seedance-2-0-260128","name":"Doubao
      Seedance 2.0 Upstream","capabilities":["video"]},{"id":"veo_3_1_fast","name":"Keyiyun
      VEO 3.1 Fast","capabilities":["video"]},{"id":"grok_video3","name":"Keyiyun
      Grok Video 3","capabilities":["video"]},{"id":"grok_video3_pro","name":"Keyiyun
      Grok Video 3 Pro","capabilities":["video"]}]}'
    DESKTOP_CONFIG_BRAND: edream
    DESKTOP_PUBLIC_CONFIG_JSON: '{"brand":"edream","logto":{"issuer":"https://auth.ymmjc.com","clientIssuer":"https://auth.ymmjc.com","clientId":"ec5db9ad91bb6b87656b","audience":["ec5db9ad91bb6b87656b","https://auth.ymmjc.com"],"jwksUri":"https://auth.ymmjc.com/.well-known/jwks","enabledConnectors":[{"id":"password","type":"email_password","name":"点击登陆"}]},"subscription":{"casdoorOrg":"edream","validStates":["Active"],"manageUrl":"https://auth.ymmjc.com/select-plan/edream/易苗梦剧场-包年订阅","relayBrokerBaseUrl":"https://api.ymmjc.com/broker","modelRechargeUrl":"https://auth.ymmjc.com/products/edream/model-quota/buy","modelRechargeAmounts":[9.8,98,198,398,998]},"whitelabel":{"presetProvider":{"displayName":"易苗梦/eDream","mediaBaseUrl":"https://edream-api.ymmjc.com/v1","agentMessagesUrl":"https://api.ymmjc.com","agentApiKeyUrl":"https://auth.ymmjc.com/products/edream/model-quota/buy","disableCustomProvider":false,"disableAgentCustom":false}}}'
    MODEL_RECHARGE_CASDOOR_OWNER: edream
    MODEL_RECHARGE_PRODUCT_NAME: model-quota
    MODEL_RECHARGE_PRODUCT_CODE: arcreel_builtin
    MODEL_RECHARGE_PLAN_CODE: model-quota
    MODEL_RECHARGE_WALLET_GROUP: all
    MODEL_RECHARGE_QUOTA_PER_CNY: '100'
  modelRechargeSync:
    enabled: true
    schedule: "*/10 * * * *"
  secret:
    create: false
    DATABASE_URL: ''
    CASDOOR_CLIENT_SECRET: ''
    NEWAPI_ADMIN_ACCESS_TOKEN: ''
    NEWAPI_DATABASE_URL: ''
    NEWAPI_REDIS_CONN_STRING: ''
    NEWAPI_CRYPTO_SECRET: ''
    INTERNAL_API_KEY: ''
    CASDOOR_DATABASE_URL: ''
    name: relay-broker-secret
casdoor:
  enabled: false
  fullnameOverride: casdoor
  instanceOverride: casdoor
  image:
    repository: 81.71.122.120/platform/casdoor
    tag: main-20260717131452
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8000
    nodePort: 30082
  config:
    httpPort: 8000
    origin: http://139.196.254.8/casdoor
    dataSourceName: ''
    create: false
    name: casdoor-config
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 768Mi
edreamcrowd:
  enabled: false
  fullnameOverride: edreamcrowd
  instanceOverride: edreamcrowd
  backend:
    image:
      repository: 81.71.122.120/platform/edreamcrowd-backend
      tag: main-20260717213114
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      port: 8080
      nodePort: 30083
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://platform-postgres:5432/edreamcrowd
      SPRING_DATASOURCE_USERNAME: edreamcrowd
      CASDOOR_ENDPOINT: http://auth.nexushome.top
      CASDOOR_APPLICATION_NAME: eDream_web
      CASDOOR_ORGANIZATION_NAME: edream
      APP_FRONTEND_URL: http://zhongchou.nexushome.top/zhongchou/
    secret:
      SPRING_DATASOURCE_PASSWORD: ''
      JASYPT_ENCRYPTOR_PASSWORD: ''
      CASDOOR_ACCESS_KEY: ''
      CASDOOR_ACCESS_SECRET: ''
      create: false
      name: edreamcrowd-backend-secret
  frontend:
    image:
      repository: 81.71.122.120/platform/edreamcrowd-frontend
      tag: main-20260717213114
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      port: 80
      nodePort: 30084
    runtimeConfig:
      edreamDownloadUrl: https://download.arc-reel.com/edream/latest
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 1024Mi
gateway:
  enabled: false
  fullnameOverride: platform-gateway
  image:
    repository: 81.71.122.120/platform/platform-gateway
    tag: main-20260717213114
    pullPolicy: IfNotPresent
  hostNetwork:
    enabled: true
    dnsPolicy: ClusterFirstWithHostNet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  service:
    enabled: false
  serverNames:
  - _
  - 139.196.254.8
  - nexushome.top
  - www.nexushome.top
  domains:
    api: api.nexushome.top
    newapiCompat: arcreel-api.nexushome.top
    auth: auth.nexushome.top
    zhongchou: zhongchou.nexushome.top
    arcreel: arcreel.nexushome.top
  upstreams:
    newApi: http://relay-new-api:3000
    broker: http://relay-broker:8080
    newapiCompat: http://newapi-compat-gateway:8080
    casdoor: http://casdoor:8000
    edreamBackend: http://edreamcrowd-backend:8080
    edreamFrontend: http://edreamcrowd-frontend:80
  download:
    path: "/downloads/edream/latest"
    redirectUrl: https://download.arc-reel.com/edream/latest
  casdoor:
    basePath: "/casdoor"
    basePathSlash: "/casdoor/"
    defaultLoginPath: "/casdoor/login/edream"
deployment:
  releaseName: platform-relay
global:
  imagePullSecrets: []
