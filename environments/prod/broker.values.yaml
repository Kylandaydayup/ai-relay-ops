replicaCount: 1

image:
  repository: ai-relay-broker
  tag: v0.1.1
  pullPolicy: IfNotPresent

containerPort: 8080

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: ""
  hosts:
    - host: broker.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

env:
  AUTH_MODE: jwt
  BROKER_PUBLIC_BASE_URL: https://broker.example.com
  CASDOOR_ISSUER: https://casdoor.example.com
  CASDOOR_AUDIENCE: arcreel
  CASDOOR_JWKS_URL: https://casdoor.example.com/.well-known/jwks
  NEWAPI_BASE_URL: https://new-api.example.com
  NEWAPI_PUBLIC_BASE_URL: https://new-api.example.com
  NEWAPI_ADMIN_USER_ID: "1"
  BROKER_MODEL_CATALOG_JSON: '{"text":[{"id":"ZHIPU/GLM-5.2","name":"GLM 5.2","capabilities":["text"]},{"id":"MiniMax-M2.5","name":"MiniMax M2.5","capabilities":["text"]},{"id":"DeepSeek-V3.2","name":"DeepSeek V3.2","capabilities":["text"]},{"id":"DeepSeek-R1-0528","name":"DeepSeek R1 0528","capabilities":["text"]},{"id":"qwen/qwen3.7-max","name":"Qwen3.7 Max","capabilities":["text"]},{"id":"Kimi/Kimi-K2.7-code","name":"Kimi K2.7 Code","capabilities":["text"]},{"id":"Qwen2.5-72B-Instruct-64K","name":"Qwen2.5 72B Instruct 64K","capabilities":["text"]}],"video":[{"id":"AICC-doubao-seedance-2.0","name":"Doubao Seedance 2.0","capabilities":["video"]}],"multimodal":[{"id":"qwen/qwen3-vl-plus","name":"Qwen3 VL Plus","capabilities":["text","image-input"]}],"embedding":[{"id":"bge-m3","name":"BGE M3","capabilities":["embedding"]}]}'
  DESKTOP_CONFIG_BRAND: edream
  DESKTOP_PUBLIC_CONFIG_JSON: '{"brand":"edream","logto":{"issuer":"https://casdoor.example.com","clientIssuer":"https://casdoor.example.com","clientId":"arcreel","audience":["arcreel","https://casdoor.example.com"],"jwksUri":"https://casdoor.example.com/.well-known/jwks","enabledConnectors":[{"id":"password","type":"email_password","name":"点击登陆"}]},"subscription":{"casdoorOrg":"edream","validStates":["Active"],"manageUrl":"https://casdoor.example.com/select-plan/edream/易苗梦剧场-包年订阅","relayBrokerBaseUrl":"https://broker.example.com","modelRechargeUrl":"https://casdoor.example.com/products/edream/model-quota/buy","modelRechargeAmounts":[9.8,98,198,398,998]},"whitelabel":{"presetProvider":{"displayName":"易苗梦/eDream","mediaBaseUrl":"https://new-api.example.com/v1","agentMessagesUrl":"https://new-api.example.com","agentApiKeyUrl":"https://casdoor.example.com/products/edream/model-quota/buy","disableCustomProvider":false,"disableAgentCustom":false}}}'

secret:
  create: true
  DATABASE_URL: postgresql+psycopg://broker:change-me@postgres:5432/broker_db
  CASDOOR_CLIENT_SECRET: change-me
  NEWAPI_ADMIN_ACCESS_TOKEN: change-me

resources: {}
