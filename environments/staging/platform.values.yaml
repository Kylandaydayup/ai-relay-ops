fullnameOverride: platform
namespace: platform

# Required staging endpoint configuration:
# - Public IP is used by serverNames and the public callback URLs below.
# - NodePort values are the host-level ports exposed by the k8s services.
# - Keep gateway.hostNetwork enabled on the single-node 139 environment so it can bind 80/3000 directly.
# Optional domain routing lives under gateway.domains; leave a domain value empty to disable that route.

databaseInit:
  enabled: true
  postgres:
    host: platform-postgres
    port: 5432
    username: postgres
    password: ""
    database: postgres
  rolePasswords:
    casdoor: ""
    edreamcrowd: ""
    newapi: ""
    broker: ""

postgres:
  enabled: true
  fullnameOverride: platform-postgres
  instanceOverride: platform-db
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  auth:
    database: postgres
    username: postgres
    password: ""
  persistence:
    enabled: true
    storageClassName: local-path
    size: 8Gi
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 1536Mi

new-api:
  enabled: true
  fullnameOverride: relay-new-api
  instanceOverride: relay-new-api
  image:
    repository: calciumion/new-api
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 3000
    nodePort: 30081
  env:
    TZ: Asia/Shanghai
    NODE_NAME: relay-new-api-staging-1
  secret:
    create: true
    SQL_DSN: ""
    REDIS_CONN_STRING: ""
    SESSION_SECRET: ""
    CRYPTO_SECRET: ""

broker:
  enabled: true
  fullnameOverride: relay-broker
  instanceOverride: relay-broker
  image:
    repository: ai-relay-broker
    tag: staging-139-direct-newapi-20260702
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8080
    nodePort: 30080
  env:
    AUTH_MODE: jwt
    BROKER_ENVIRONMENT: staging
    BROKER_PUBLIC_BASE_URL: http://api.nexushome.top/broker
    CASDOOR_ISSUER: http://139.196.254.8/casdoor
    CASDOOR_AUDIENCE: ec5db9ad91bb6b87656b
    CASDOOR_JWKS_URL: http://casdoor:8000/.well-known/jwks
    NEWAPI_BASE_URL: http://relay-new-api:3000
    NEWAPI_PUBLIC_BASE_URL: http://api.nexushome.top
    NEWAPI_ADMIN_USER_ID: "1"
    NEWAPI_MANAGED_TOKEN_GROUP: default
    NEWAPI_MANAGED_TOKEN_QUOTA_MULTIPLIER: "5000"
    BROKER_MODEL_CATALOG_JSON: '{"text":[{"id":"qwen/qwen3.7-max","name":"Qwen3.7 Max","capabilities":["text"]},{"id":"MiniMax-M2.5","name":"MiniMax M2.5","capabilities":["text"],"agent_default":true},{"id":"deepseek-v3.2","name":"DeepSeek V3.2","capabilities":["text"]},{"id":"deepseek-r1-0528","name":"DeepSeek R1 0528","capabilities":["text"]},{"id":"ZHIPU/GLM-5.2","name":"GLM 5.2","capabilities":["text"]}],"image":[{"id":"qwen/qwen-image-2.0-pro","name":"Qwen Image 2.0 Pro","capabilities":["image"],"endpoint":"openai-images"}],"video":[{"id":"AICC-doubao-seedance-2.0","name":"Doubao Seedance 2.0","capabilities":["video"]},{"id":"doubao-seedance-2.0","name":"Doubao Seedance 2.0 Raw","capabilities":["video"]},{"id":"doubao-seedance-2-0-260128","name":"Doubao Seedance 2.0 Upstream","capabilities":["video"]}]}'
    DESKTOP_CONFIG_BRAND: edream
    DESKTOP_PUBLIC_CONFIG_JSON: '{"brand":"edream","logto":{"issuer":"http://139.196.254.8/casdoor","clientIssuer":"http://auth.nexushome.top","clientId":"ec5db9ad91bb6b87656b","audience":["ec5db9ad91bb6b87656b","http://139.196.254.8/casdoor"],"jwksUri":"http://auth.nexushome.top/.well-known/jwks","enabledConnectors":[{"id":"password","type":"email_password","name":"点击登陆"}]},"subscription":{"casdoorOrg":"edream","validStates":["Active"],"manageUrl":"http://auth.nexushome.top/select-plan/edream/易苗梦剧场-包年订阅","relayBrokerBaseUrl":"http://api.nexushome.top/broker","modelRechargeUrl":"http://auth.nexushome.top/products/edream/model-quota/buy","modelRechargeAmounts":[9.8,98,198,398,998]},"whitelabel":{"presetProvider":{"displayName":"易苗梦/eDream","mediaBaseUrl":"http://api.nexushome.top/v1","agentMessagesUrl":"http://api.nexushome.top","agentApiKeyUrl":"http://auth.nexushome.top/products/edream/model-quota/buy","disableCustomProvider":false,"disableAgentCustom":false}}}'
    MODEL_RECHARGE_CASDOOR_OWNER: edream
    MODEL_RECHARGE_PRODUCT_NAME: model-quota
    MODEL_RECHARGE_PRODUCT_CODE: arcreel_builtin
    MODEL_RECHARGE_PLAN_CODE: model-quota
    MODEL_RECHARGE_WALLET_GROUP: all
    MODEL_RECHARGE_QUOTA_PER_CNY: "100"
  modelRechargeSync:
    enabled: true
    schedule: "*/1 * * * *"
  secret:
    create: true
    DATABASE_URL: ""
    CASDOOR_CLIENT_SECRET: ""
    NEWAPI_ADMIN_ACCESS_TOKEN: ""
    INTERNAL_API_KEY: ""
    CASDOOR_DATABASE_URL: ""

casdoor:
  enabled: true
  fullnameOverride: casdoor
  instanceOverride: casdoor
  image:
    repository: casbin/casdoor
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8000
    nodePort: 30082
  config:
    httpPort: 8000
    origin: http://139.196.254.8/casdoor
    dataSourceName: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 768Mi

edreamcrowd:
  enabled: true
  fullnameOverride: edreamcrowd
  instanceOverride: edreamcrowd
  backend:
    image:
      repository: edreamcrowd-backend
      tag: staging-139
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      port: 8080
      nodePort: 30083
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://platform-postgres:5432/edreamcrowd
      SPRING_DATASOURCE_USERNAME: edreamcrowd
      CASDOOR_ENDPOINT: http://139.196.254.8/casdoor
      CASDOOR_APPLICATION_NAME: eDream_web
      CASDOOR_ORGANIZATION_NAME: edream
      APP_FRONTEND_URL: http://139.196.254.8/zhongchou/
    secret:
      SPRING_DATASOURCE_PASSWORD: ""
      JASYPT_ENCRYPTOR_PASSWORD: ""
      CASDOOR_ACCESS_KEY: ""
      CASDOOR_ACCESS_SECRET: ""
  frontend:
    image:
      repository: edreamcrowd-frontend
      tag: staging-139-v5
      pullPolicy: IfNotPresent
    service:
      type: NodePort
      port: 80
      nodePort: 30084
    runtimeConfig:
      edreamDownloadUrl: https://download.arc-reel.com/edream/latest
  resources:
    requests:
      memory: 256Mi
      cpu: 50m
    limits:
      memory: 1024Mi

gateway:
  enabled: true
  fullnameOverride: platform-gateway
  image:
    repository: edreamcrowd-frontend
    tag: staging-139-v5
    pullPolicy: IfNotPresent
  hostNetwork:
    enabled: true
    dnsPolicy: ClusterFirstWithHostNet
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  service:
    enabled: false
  serverNames:
    - _
    - 139.196.254.8
    - nexushome.top
    - www.nexushome.top
  domains:
    api: api.nexushome.top
    auth: auth.nexushome.top
    zhongchou: zhongchou.nexushome.top
    arcreel: arcreel.nexushome.top
  upstreams:
    newApi: http://relay-new-api:3000
    broker: http://relay-broker:8080
    casdoor: http://casdoor:8000
    edreamBackend: http://edreamcrowd-backend:8080
    edreamFrontend: http://edreamcrowd-frontend:80
  download:
    path: /downloads/edream/latest
    redirectUrl: https://download.arc-reel.com/edream/latest
  casdoor:
    basePath: /casdoor
    basePathSlash: /casdoor/
    defaultLoginPath: /casdoor/login/edream
