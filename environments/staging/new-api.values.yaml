fullnameOverride: relay-new-api

replicaCount: 1

image:
  repository: calciumion/new-api
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 3000

service:
  type: NodePort
  port: 3000
  nodePort: 30081

ingress:
  enabled: false
  hosts: []
  tls: []

env:
  TZ: Asia/Shanghai
  NODE_NAME: relay-new-api-staging-1

secret:
  create: true
  # Staging must override SQL_DSN from /root/platform-secrets/staging.env:
  # postgresql://newapi:<NEWAPI_DB_PASSWORD>@platform-postgres:5432/newapi
  SQL_DSN: ""
  REDIS_CONN_STRING: ""
  # Preserve the old new-api SESSION_SECRET when migrating existing channel keys.
  # If CRYPTO_SECRET was not set before, use the same value as SESSION_SECRET.
  SESSION_SECRET: change-me-at-deploy-time
  CRYPTO_SECRET: change-me-at-deploy-time

resources: {}
