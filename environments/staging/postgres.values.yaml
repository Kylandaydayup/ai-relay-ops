fullnameOverride: platform-postgres

image:
  repository: postgres
  tag: 16-alpine
  pullPolicy: IfNotPresent

containerPort: 5432

service:
  type: ClusterIP
  port: 5432

auth:
  database: postgres
  username: postgres
  password: ""

persistence:
  enabled: true
  storageClassName: local-path
  size: 8Gi

resources:
  requests:
    memory: 512Mi
    cpu: 100m
  limits:
    memory: 1536Mi
