{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "new-api.secretName" . }}
  labels:
    {{- include "new-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  SQL_DSN: {{ .Values.secret.SQL_DSN | quote }}
  REDIS_CONN_STRING: {{ .Values.secret.REDIS_CONN_STRING | quote }}
  SESSION_SECRET: {{ required "secret.SESSION_SECRET is required" .Values.secret.SESSION_SECRET | quote }}
  CRYPTO_SECRET: {{ required "secret.CRYPTO_SECRET is required" .Values.secret.CRYPTO_SECRET | quote }}
{{- end }}
