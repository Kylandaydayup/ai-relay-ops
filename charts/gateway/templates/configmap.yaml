apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "gateway.fullname" . }}-nginx
  labels:
    {{- include "gateway.labels" . | nindent 4 }}
data:
  default.conf: |
    {{- if .Values.domains.api }}
    server {
        listen {{ .Values.containerPorts.http }};
        server_name {{ .Values.domains.api }};

        client_max_body_size {{ .Values.clientMaxBodySize }};

        location / {
            proxy_pass {{ .Values.upstreams.newApi }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    {{- end }}
    {{- if .Values.domains.auth }}
    server {
        listen {{ .Values.containerPorts.http }};
        server_name {{ .Values.domains.auth }};

        client_max_body_size {{ .Values.clientMaxBodySize }};

        location / {
            proxy_pass {{ .Values.upstreams.casdoor }}/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }

    {{- end }}
    {{- if .Values.domains.zhongchou }}
    server {
        listen {{ .Values.containerPorts.http }};
        server_name {{ .Values.domains.zhongchou }};

        client_max_body_size {{ .Values.clientMaxBodySize }};

        location {{ .Values.edreamcrowd.apiPath }} {
            proxy_pass {{ .Values.upstreams.edreamBackend }}{{ .Values.edreamcrowd.apiPath }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size {{ .Values.clientMaxBodySize }};
        }

        location {{ .Values.edreamcrowd.oauthPath }} {
            proxy_pass {{ .Values.upstreams.edreamBackend }}{{ .Values.edreamcrowd.oauthPath }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location {{ .Values.edreamcrowd.loginOauthPath }} {
            proxy_pass {{ .Values.upstreams.edreamBackend }}{{ .Values.edreamcrowd.loginOauthPath }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass {{ .Values.upstreams.edreamFrontend }}/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    {{- end }}
    {{- if .Values.domains.arcreel }}
    server {
        listen {{ .Values.containerPorts.http }};
        server_name {{ .Values.domains.arcreel }};

        default_type text/plain;
        return 404 "{{ .Values.domains.arcreel }} is not configured yet\n";
    }

    {{- end }}
    server {
        listen {{ .Values.containerPorts.http }} default_server;
        server_name {{ include "gateway.serverNames" . }};

        client_max_body_size {{ .Values.clientMaxBodySize }};

        location = {{ .Values.download.path }} {
            return 302 {{ .Values.download.redirectUrl }};
        }

        location = {{ .Values.casdoor.basePath }} {
            return 301 {{ .Values.casdoor.basePathSlash }};
        }

        location = {{ .Values.casdoor.basePathSlash }} {
            return 302 {{ .Values.casdoor.defaultLoginPath }};
        }

        location = {{ .Values.casdoor.basePathSlash }}login {
            return 302 {{ .Values.casdoor.defaultLoginPath }};
        }

        location {{ .Values.casdoor.basePathSlash }} {
            proxy_pass {{ .Values.upstreams.casdoor }}/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix {{ .Values.casdoor.basePath }};
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_redirect ~^(/.*)$ {{ .Values.casdoor.basePath }}$1;
            proxy_hide_header ETag;
            add_header Cache-Control "no-store";
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types application/javascript text/css text/html;
            sub_filter '</body>' '<script>(function(){var target="{{ .Values.casdoor.defaultAfterLoginUrl }}";setInterval(function(){if(window.location.pathname==="{{ .Values.casdoor.basePathSlash }}"){window.location.replace(target)}},500)})()</script></body>';
            sub_filter '="/static/' '="{{ .Values.casdoor.basePath }}/static/';
            sub_filter '="/api/' '="{{ .Values.casdoor.basePath }}/api/';
            sub_filter '"/static/' '"{{ .Values.casdoor.basePath }}/static/';
            sub_filter '"/api/' '"{{ .Values.casdoor.basePath }}/api/';
            sub_filter "'/static/" "'{{ .Values.casdoor.basePath }}/static/";
            sub_filter "'/api/" "'{{ .Values.casdoor.basePath }}/api/";
            sub_filter '__webpack_require__.p="/"' '__webpack_require__.p="{{ .Values.casdoor.basePathSlash }}"';
            sub_filter '(0,Qe.jsx)(br.VK,{children:' '(0,Qe.jsx)(br.VK,{basename:"{{ .Values.casdoor.basePath }}",children:';
            sub_filter 'return null===e?"/":e}function scrollToDiv' 'return!e||"/"===e||"{{ .Values.casdoor.basePath }}"===e||"{{ .Values.casdoor.basePathSlash }}"===e||e.indexOf("/login")>=0?"{{ .Values.casdoor.defaultAfterLoginUrl }}":e}function scrollToDiv';
            sub_filter 'null!==t&&""!==t?window.location.href=t:c.goToLink("/")' 't&&""!==t&&"/"!==t&&"{{ .Values.casdoor.basePath }}"!==t&&"{{ .Values.casdoor.basePathSlash }}"!==t&&t.indexOf("/login")<0?window.location.href=t:window.location.href="{{ .Values.casdoor.defaultAfterLoginUrl }}"';
        }

        location {{ .Values.broker.internalPath }} {
            return 404;
        }

        location = {{ .Values.newApi.basePath }} {
            return 301 /;
        }

        location {{ .Values.newApi.basePathSlash }} {
            return 301 /;
        }

        location {{ .Values.newApi.oldBasePath }} {
            return 301 /;
        }

        location {{ .Values.broker.basePath }} {
            proxy_pass {{ .Values.upstreams.broker }}/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location {{ .Values.edreamcrowd.apiPath }} {
            proxy_pass {{ .Values.upstreams.edreamBackend }}{{ .Values.edreamcrowd.apiPath }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            client_max_body_size {{ .Values.clientMaxBodySize }};
        }

        location {{ .Values.edreamcrowd.oauthPath }} {
            proxy_pass {{ .Values.upstreams.edreamBackend }}{{ .Values.edreamcrowd.oauthPath }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location {{ .Values.edreamcrowd.loginOauthPath }} {
            proxy_pass {{ .Values.upstreams.edreamBackend }}{{ .Values.edreamcrowd.loginOauthPath }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = {{ .Values.edreamcrowd.basePath }} {
            return 301 {{ .Values.edreamcrowd.basePathSlash }};
        }

        location {{ .Values.edreamcrowd.basePathSlash }} {
            proxy_pass {{ .Values.upstreams.edreamFrontend }}/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass {{ .Values.upstreams.newApi }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
    {{- if .Values.compat.enabled }}

    server {
        listen {{ .Values.containerPorts.compat }};
        server_name _;

        client_max_body_size {{ .Values.clientMaxBodySize }};

        location {{ .Values.broker.internalPath }} {
            return 404;
        }

        location = {{ .Values.newApi.basePath }} {
            return 301 /;
        }

        location {{ .Values.newApi.basePathSlash }} {
            return 301 /;
        }

        location {{ .Values.newApi.oldBasePath }} {
            return 301 /;
        }

        location {{ .Values.broker.basePath }} {
            proxy_pass {{ .Values.upstreams.broker }}/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            proxy_pass {{ .Values.upstreams.newApi }};
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
    {{- end }}
