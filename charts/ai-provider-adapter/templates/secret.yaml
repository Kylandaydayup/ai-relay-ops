{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-provider-adapter.secretName" . }}
  labels:
    {{- include "ai-provider-adapter.labels" . | nindent 4 }}
type: Opaque
stringData:
  MOMA_SEEDANCE_API_KEY: {{ .Values.secret.MOMA_SEEDANCE_API_KEY | quote }}
  KEYIYUN_API_KEY: {{ .Values.secret.KEYIYUN_API_KEY | quote }}
{{- end }}
