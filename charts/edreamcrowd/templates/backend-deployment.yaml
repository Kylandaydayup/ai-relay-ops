apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edreamcrowd.fullname" . }}-backend
  labels:
    {{- include "edreamcrowd.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "edreamcrowd.name" . }}
      app.kubernetes.io/instance: {{ include "edreamcrowd.instance" . }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "edreamcrowd.name" . }}
        app.kubernetes.io/instance: {{ include "edreamcrowd.instance" . }}
        app.kubernetes.io/component: backend
      annotations:
        checksum/secret: {{ include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.backend.postgresWait.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.backend.postgresWait.image.repository }}:{{ .Values.backend.postgresWait.image.tag }}"
          imagePullPolicy: {{ .Values.backend.postgresWait.image.pullPolicy }}
          command:
            - sh
            - -c
          args:
            - >-
              until pg_isready -h {{ .Values.backend.postgresWait.host }} -p {{ .Values.backend.postgresWait.port }};
              do echo waiting for postgres; sleep {{ .Values.backend.postgresWait.intervalSeconds }}; done
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.containerPort }}
          env:
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "edreamcrowd.fullname" . }}-backend-secret
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.readiness.periodSeconds }}
            failureThreshold: {{ .Values.backend.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
