apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "edreamcrowd.fullname" . }}-frontend
  labels:
    {{- include "edreamcrowd.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "edreamcrowd.name" . }}
      app.kubernetes.io/instance: {{ include "edreamcrowd.instance" . }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "edreamcrowd.name" . }}
        app.kubernetes.io/instance: {{ include "edreamcrowd.instance" . }}
        app.kubernetes.io/component: frontend
      annotations:
        checksum/nginx: {{ include (print $.Template.BasePath "/frontend-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.containerPort }}
          volumeMounts:
            - name: nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: nginx
              mountPath: /usr/share/nginx/html/runtime-config.js
              subPath: runtime-config.js
          readinessProbe:
            httpGet:
              path: {{ .Values.frontend.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.frontend.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.frontend.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: nginx
          configMap:
            name: {{ include "edreamcrowd.fullname" . }}-frontend-nginx
