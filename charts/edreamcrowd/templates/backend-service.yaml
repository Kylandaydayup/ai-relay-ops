apiVersion: v1
kind: Service
metadata:
  name: {{ include "edreamcrowd.fullname" . }}-backend
  labels:
    {{- include "edreamcrowd.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.backend.service.type "NodePort") .Values.backend.service.nodePort }}
      nodePort: {{ .Values.backend.service.nodePort }}
      {{- end }}
  selector:
    app.kubernetes.io/name: {{ include "edreamcrowd.name" . }}
    app.kubernetes.io/instance: {{ include "edreamcrowd.instance" . }}
    app.kubernetes.io/component: backend
