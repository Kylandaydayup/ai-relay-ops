{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "broker.secretName" . }}
  labels:
    {{- include "broker.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "secret.DATABASE_URL is required" .Values.secret.DATABASE_URL | quote }}
  CASDOOR_CLIENT_SECRET: {{ .Values.secret.CASDOOR_CLIENT_SECRET | quote }}
  NEWAPI_ADMIN_ACCESS_TOKEN: {{ required "secret.NEWAPI_ADMIN_ACCESS_TOKEN is required" .Values.secret.NEWAPI_ADMIN_ACCESS_TOKEN | quote }}
  NEWAPI_DATABASE_URL: {{ .Values.secret.NEWAPI_DATABASE_URL | quote }}
  NEWAPI_REDIS_CONN_STRING: {{ .Values.secret.NEWAPI_REDIS_CONN_STRING | quote }}
  NEWAPI_CRYPTO_SECRET: {{ .Values.secret.NEWAPI_CRYPTO_SECRET | quote }}
  INTERNAL_API_KEY: {{ .Values.secret.INTERNAL_API_KEY | quote }}
  CASDOOR_DATABASE_URL: {{ .Values.secret.CASDOOR_DATABASE_URL | quote }}
{{- end }}
