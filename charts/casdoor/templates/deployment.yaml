apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "casdoor.fullname" . }}
  labels:
    {{- include "casdoor.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "casdoor.name" . }}
      app.kubernetes.io/instance: {{ include "casdoor.instance" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "casdoor.name" . }}
        app.kubernetes.io/instance: {{ include "casdoor.instance" . }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresWait.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgresWait.image.repository }}:{{ .Values.postgresWait.image.tag }}"
          imagePullPolicy: {{ .Values.postgresWait.image.pullPolicy }}
          command:
            - sh
            - -c
          args:
            - >-
              until pg_isready -h {{ .Values.postgresWait.host }} -p {{ .Values.postgresWait.port }};
              do echo waiting for postgres; sleep {{ .Values.postgresWait.intervalSeconds }}; done
      {{- end }}
      containers:
        - name: casdoor
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
          args:
            - |
              set -e
              if [ -f /conf/app.conf ]; then
                if [ -z "${driverName:-}" ]; then
                  driverName="$(awk -F '= *' '$1 == "driverName" {gsub(/^"|"$/, "", $2); print $2; exit}' /conf/app.conf)"
                  export driverName
                fi
                if [ -z "${dataSourceName:-}" ]; then
                  dataSourceName="$(awk -F '= *' '$1 == "dataSourceName" {sub(/^[[:space:]]*"/, "", $2); sub(/"[[:space:]]*$/, "", $2); print $2; exit}' /conf/app.conf)"
                  export dataSourceName
                fi
              fi
              exec /bin/bash /docker-entrypoint.sh
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            - name: driverName
              value: {{ .Values.config.driverName | quote }}
            {{- if .Values.config.dataSourceName }}
            - name: dataSourceName
              value: {{ .Values.config.dataSourceName | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPort }}
          volumeMounts:
            - name: config
              mountPath: /conf/app.conf
              subPath: app.conf
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "casdoor.configName" . }}
