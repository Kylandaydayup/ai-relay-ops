nameOverride: ""
fullnameOverride: platform
namespace: platform

global:
  imagePullSecrets: []

databaseInit:
  enabled: true
  secret:
    create: true
    name: ""
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  ttlSecondsAfterFinished: 600
  postgres:
    host: platform-postgres
    port: 5432
    username: postgres
    password: ""
    database: postgres
  rolePasswords:
    casdoor: ""
    edreamcrowd: ""
    newapi: ""
    broker: ""

postgres:
  enabled: true

new-api:
  enabled: true

ai-provider-adapter:
  enabled: false

newapi-compat-gateway:
  enabled: false

broker:
  enabled: true

casdoor:
  enabled: true

edreamcrowd:
  enabled: true

gateway:
  enabled: true
