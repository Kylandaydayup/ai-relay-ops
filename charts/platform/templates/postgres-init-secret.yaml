{{- if .Values.databaseInit.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "platform.fullname" . }}-postgres-init-secret
  labels:
    {{- include "platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "databaseInit.postgres.password is required" .Values.databaseInit.postgres.password | quote }}
  CASDOOR_DB_PASSWORD: {{ required "databaseInit.rolePasswords.casdoor is required" .Values.databaseInit.rolePasswords.casdoor | quote }}
  EDREAMCROWD_DB_PASSWORD: {{ required "databaseInit.rolePasswords.edreamcrowd is required" .Values.databaseInit.rolePasswords.edreamcrowd | quote }}
  NEWAPI_DB_PASSWORD: {{ required "databaseInit.rolePasswords.newapi is required" .Values.databaseInit.rolePasswords.newapi | quote }}
  BROKER_DB_PASSWORD: {{ required "databaseInit.rolePasswords.broker is required" .Values.databaseInit.rolePasswords.broker | quote }}
{{- end }}
